version: "3.9"

services:

  # ── Infrastructure ──────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Monitoring Service ──────────────────────────────────

  monitoring:
    build:
      context: ./backend/monitoring_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL:    redis://redis:6379
      POSTGRES_URL: postgresql://ims:ims@postgres/ims
      MONGO_URL:    mongodb://mongo:27017
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 &
             python debounce_runner.py"

  # ── Incident Service ────────────────────────────────────

  incident:
    build:
      context: ./backend/incident_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      REDIS_URL:    redis://redis:6379
      POSTGRES_URL: postgresql://ims:ims@postgres/ims
      MONGO_URL:    mongodb://mongo:27017
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  # ── Frontend ────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_MONITORING_URL: http://localhost:8000
      REACT_APP_INCIDENT_URL:   http://localhost:8001
    depends_on:
      - incident

volumes:
  postgres_data:
  mongo_data:
  redis_data: